version: '3.8'

services:
  # Servicio principal (opcional - si necesitas API o frontend)
  trading-mvp:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    container_name: trading-mvp-app
    environment:
      - AUTOPILOT_MODE=${AUTOPILOT_MODE:-on}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Agrega las demás variables de entorno que necesites
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # Servicio de Cron Jobs
  trading-cron:
    build:
      context: .
      dockerfile: Dockerfile.coolify-cron
    container_name: trading-mvp-cron
    environment:
      - AUTOPILOT_MODE=${AUTOPILOT_MODE:-on}
      - DATABASE_URL=${DATABASE_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Agrega las demás variables de entorno que necesites
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

# No necesitamos networks extra para este caso simple